name: Build Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build exe
        run: pyinstaller --noconfirm --clean --onefile --windowed --name "谷歌验证器" main.py

      - name: Package exe
        shell: pwsh
        run: Compress-Archive -Path 'dist/谷歌验证器.exe' -DestinationPath 'dist/谷歌验证器-windows-amd64.zip'

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} 'dist/谷歌验证器-windows-amd64.zip' --clobber
